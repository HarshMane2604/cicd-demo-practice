name: Full-stack CI/CD

on:
  push: branches:["main", "master"]
  pull_request: branches:["main", "master"]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt

      - name: Run Pytest
        working directory: ./backend
        run: pytest

  frontend-build:
    runs-on: ubantu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: set up node js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependeny-path: "./frontend/package-lock.json"
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: build frontend
        working-directory: ./frontend
        run: npm run build

  deploy:
    needs: [backend-test, frontend-build]
    runs-on: ubantu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up QEMU
        uses: docker/setup-qemu-actions@v3

      - name: Set up docker buildx
        uses: docker/setup-buildx-actions@v3

      - name: login to docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME}}/fullstack-demo-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME}}/fullstack-demo-frontend:latest
